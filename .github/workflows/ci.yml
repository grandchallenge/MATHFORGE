name: Forge checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  reconnaissance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install validation dependency
        run: python -m pip install jsonschema
      - name: Recompute small-family audit
        run: python domains/union_closed/enumerate_small_families.py
      - name: Confirm committed audit is reproducible
        run: git diff --exit-code
      - name: Parse JSON artifacts
        run: python ci/validate_forge.py
      - name: Test discovery adapters
        run: python -m unittest discover -s tests -v
